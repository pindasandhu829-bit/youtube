<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>30 Screens Auto-Player</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header { position: sticky; top: 0; background: #111; padding: 15px; z-index: 1000; border-bottom: 2px solid red; }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: red; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 20px; }
        iframe { width: 100%; height: 150px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Multi-Screen Player</h2>
        <input type="text" id="videoInput" placeholder="Video ID ya Full Link yahan daalein">
        <button onclick="playVideos()">Start 30 Screens</button>
    </div>

    <div class="grid" id="container"></div>

    <script>
        function playVideos() {
            const input = document.getElementById('videoInput').value;
            const container = document.getElementById('container');
            container.innerHTML = '';

            // Video ID nikalne ka sabse safe tareeka
            let videoId = input;
            if (input.includes('v=')) {
                videoId = input.split('v=')[1].split('&')[0];
            } else if (input.includes('be/')) {
                videoId = input.split('be/')[1].split('?')[0];
            }

            if(videoId.length < 5) {
                alert("Sahi Video Link ya ID daalein!");
                return;
            }

            for (let i = 0; i < 30; i++) {
                const ifr = document.createElement('iframe');
                // 'origin' parameter daalne se 'IP not found' wali dikat kam aati hai
                ifr.src = `https://youtube.com{videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&origin=${window.location.origin}`;
                ifr.allow = "autoplay; encrypted-media";
                container.appendChild(ifr);
            }
        }
    </script>
</body>
</html>
