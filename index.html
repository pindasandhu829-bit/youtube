<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>30 Screens Multi-Viewer</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .controls { position: sticky; top: 0; background: #222; padding: 20px; z-index: 100; border-radius: 10px; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        iframe { width: 100%; height: 180px; border: 2px solid #444; border-radius: 8px; }
        input { padding: 12px; width: 50%; border-radius: 5px; border: none; font-size: 16px; }
        button { padding: 12px 25px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #cc0000; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>YouTube 30 Screens Auto-Player</h2>
        <p>Video ka poora Link yahan daalein:</p>
        <input type="text" id="videoUrl" placeholder="https://youtube.com">
        <button onclick="startMultiView()">Start 30 Screens</button>
    </div>

    <div class="grid-container" id="videoGrid"></div>

    <script>
        function startMultiView() {
            const urlInput = document.getElementById('videoUrl').value;
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = ''; 

            // YouTube URL se ID nikalne ka tareeka
            let videoId = "";
            if (urlInput.includes("v=")) {
                videoId = urlInput.split("v=")[1].split("&")[0];
            } else if (urlInput.includes("be/")) {
                videoId = urlInput.split("be/")[1].split("?")[0];
            }

            if (!videoId) { alert("Sahi YouTube link daalein!"); return; }

            for (let i = 0; i < 30; i++) {
                const iframe = document.createElement('iframe');
                // mute=1 aur autoplay=1 zaroori hai automatic chalne ke liye
                iframe.src = `https://youtube.com{videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}`;
                iframe.allow = "autoplay; encrypted-media";
                grid.appendChild(iframe);
            }
        }
    </script>
</body>
</html>
